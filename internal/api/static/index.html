<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PoolForge</title>
<style>
:root {
  --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
  --text: #e4e4e7; --muted: #71717a; --accent: #3b82f6;
  --green: #22c55e; --yellow: #eab308; --red: #ef4444;
  --radius: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
a { color: var(--accent); text-decoration: none; }

.header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 20px; font-weight: 600; }
.header .logo { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }

.container { max-width: 1100px; margin: 0 auto; padding: 24px; }

.toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }

button, .btn {
  padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--surface); color: var(--text); cursor: pointer; font-size: 13px;
  transition: border-color 0.15s;
}
button:hover, .btn:hover { border-color: var(--accent); }
button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
button.danger { border-color: var(--red); color: var(--red); }
button.danger:hover { background: var(--red); color: #fff; }

.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; margin-bottom: 16px;
}
.card h2 { font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

.badge {
  display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px;
  font-weight: 600; text-transform: uppercase;
}
.badge.healthy { background: rgba(34,197,94,0.15); color: var(--green); }
.badge.degraded { background: rgba(234,179,8,0.15); color: var(--yellow); }
.badge.failed { background: rgba(239,68,68,0.15); color: var(--red); }
.badge.rebuilding { background: rgba(59,130,246,0.15); color: var(--accent); }
.badge.expanding { background: rgba(59,130,246,0.15); color: var(--accent); }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; color: var(--muted); font-weight: 500; padding: 8px 12px; border-bottom: 1px solid var(--border); }
td { padding: 8px 12px; border-bottom: 1px solid var(--border); }

.progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-bar .fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.5s; }

.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 100; align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 24px; min-width: 400px; max-width: 500px;
}
.modal h3 { margin-bottom: 16px; }
.modal label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 4px; margin-top: 12px; }
.modal input, .modal select {
  width: 100%; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); font-size: 13px;
}
.modal .actions { margin-top: 20px; display: flex; gap: 8px; justify-content: flex-end; }

.disk-select { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.disk-chip {
  padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius);
  cursor: pointer; font-size: 12px; transition: all 0.15s;
}
.disk-chip:hover { border-color: var(--accent); }
.disk-chip.selected { border-color: var(--accent); background: rgba(59,130,246,0.15); }

.disk-chip.in-use { opacity: 0.4; cursor: not-allowed; border-color: var(--border); }

.empty { text-align: center; padding: 48px; color: var(--muted); }
.toast {
  position: fixed; bottom: 24px; right: 24px; padding: 12px 20px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 13px; z-index: 200; opacity: 0; transition: opacity 0.3s;
}
.toast.show { opacity: 1; }
.toast.error { border-color: var(--red); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">P</div>
  <h1>PoolForge</h1>
</div>

<div class="container">
  <div class="toolbar">
    <button class="primary" onclick="showCreateModal()">+ Create Pool</button>
    <button onclick="importPool()">📥 Import</button>
    <button onclick="refresh()">↻ Refresh</button>
    <span style="flex:1"></span>
    <button id="tabPoolsBtn" class="primary" onclick="switchTab('pools')">Pools</button>
    <button id="tabMonitorBtn" onclick="switchTab('monitor')">📊 Monitoring</button>
  </div>
  <div id="tabPools">
    <div id="pools"></div>
    <div id="shares"></div>
    <div id="users"></div>
    <div id="safety"></div>
    <div id="alerts"></div>
    <div id="logs"></div>
  </div>
  <div id="tabMonitor" style="display:none">
    <div class="card">
      <h2>📊 Real-Time Monitoring
        <span style="flex:1"></span>
        <span id="protocolStatus" style="font-size:12px"></span>
      </h2>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:16px">
        <div class="gauge-card" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px">
          <div style="font-size:12px;color:var(--muted);margin-bottom:6px">Disk Read</div>
          <div id="gaugeDiskRead" style="font-size:24px;font-weight:700;color:var(--green)">0 MB/s</div>
        </div>
        <div class="gauge-card" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px">
          <div style="font-size:12px;color:var(--muted);margin-bottom:6px">Disk Write</div>
          <div id="gaugeDiskWrite" style="font-size:24px;font-weight:700;color:var(--accent)">0 MB/s</div>
        </div>
        <div class="gauge-card" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px">
          <div style="font-size:12px;color:var(--muted);margin-bottom:6px">Network In</div>
          <div id="gaugeNetRx" style="font-size:24px;font-weight:700;color:var(--green)">0 MB/s</div>
        </div>
        <div class="gauge-card" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px">
          <div style="font-size:12px;color:var(--muted);margin-bottom:6px">Network Out</div>
          <div id="gaugeNetTx" style="font-size:24px;font-weight:700;color:var(--accent)">0 MB/s</div>
        </div>
        <div class="gauge-card" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px">
          <div style="font-size:12px;color:var(--muted);margin-bottom:6px">SMB Throughput</div>
          <div id="gaugeSMB" style="font-size:24px;font-weight:700;color:var(--yellow)">0 conn</div>
        </div>
        <div class="gauge-card" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px">
          <div style="font-size:12px;color:var(--muted);margin-bottom:6px">NFS Throughput</div>
          <div id="gaugeNFS" style="font-size:24px;font-weight:700;color:var(--yellow)">0 conn</div>
        </div>
      </div>
      <h3 style="font-size:13px;margin-bottom:8px">Connected Clients</h3>
      <table id="clientsTable">
        <tr><th>User</th><th>IP</th><th>Share</th><th>Protocol</th><th>Duration</th></tr>
      </table>
      <div id="noClients" style="text-align:center;padding:16px;color:var(--muted);font-size:13px">No active connections</div>
    </div>
  </div>
</div>

<!-- Create Pool Modal -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <h3>Create Pool</h3>
    <label>Pool Name</label>
    <input id="poolName" placeholder="mypool">
    <label>Parity Mode</label>
    <select id="parityMode"><option value="shr1">SHR-1 (single parity)</option><option value="shr2">SHR-2 (dual parity)</option></select>
    <label>Select Disks (min 2)</label>
    <div style="margin-bottom:6px"><button onclick="autoSelectDisks()" style="font-size:11px;padding:4px 10px">⚡ Auto-select all (optimal)</button></div>
    <div class="disk-select" id="diskSelect"></div>
    <div id="createPreview" style="margin-top:12px"></div>
    <div class="actions">
      <button onclick="closeModal('createModal')">Cancel</button>
      <button class="primary" onclick="createPool()">Create</button>
    </div>
  </div>
</div>

<!-- Action Modal (add/replace/fail) -->
<div class="modal-overlay" id="actionModal">
  <div class="modal">
    <h3 id="actionTitle">Action</h3>
    <div id="actionBody"></div>
    <div class="actions">
      <button onclick="closeModal('actionModal')">Cancel</button>
      <button class="primary" id="actionSubmit">Submit</button>
    </div>
  </div>
</div>

<!-- Share Create Modal -->
<div class="modal-overlay" id="shareModal">
  <div class="modal">
    <h3 id="shareModalTitle">Create Share</h3>
    <label>Share Name</label>
    <input id="shareNameInput" placeholder="documents">
    <label>Protocols</label>
    <div style="display:flex;gap:12px;margin-top:4px">
      <label style="display:flex;align-items:center;gap:4px;font-size:13px;color:var(--text)"><input type="checkbox" id="shareSMB" checked> SMB</label>
      <label style="display:flex;align-items:center;gap:4px;font-size:13px;color:var(--text)"><input type="checkbox" id="shareNFS"> NFS</label>
    </div>
    <label>NFS Client Restriction</label>
    <input id="shareNFSClients" placeholder="* (all)" value="*">
    <div style="display:flex;gap:12px;margin-top:12px">
      <label style="display:flex;align-items:center;gap:4px;font-size:13px;color:var(--text)"><input type="checkbox" id="shareReadOnly"> Read-only</label>
      <label style="display:flex;align-items:center;gap:4px;font-size:13px;color:var(--text)"><input type="checkbox" id="shareGuest"> Guest access</label>
      <label style="display:flex;align-items:center;gap:4px;font-size:13px;color:var(--text)"><input type="checkbox" id="shareBrowsable" checked> Browsable</label>
    </div>
    <input type="hidden" id="sharePoolID">
    <input type="hidden" id="shareEditName">
    <div class="actions">
      <button onclick="closeModal('shareModal')">Cancel</button>
      <button class="primary" onclick="submitShare()">Create</button>
    </div>
  </div>
</div>

<!-- User Create Modal -->
<div class="modal-overlay" id="userModal">
  <div class="modal">
    <h3>Add User</h3>
    <label>Username</label>
    <input id="userNameInput" placeholder="bob">
    <label>Password</label>
    <input id="userPassInput" type="password" placeholder="password">
    <label>Pool</label>
    <select id="userPoolSelect"></select>
    <div style="margin-top:12px">
      <label style="display:flex;align-items:center;gap:4px;font-size:13px;color:var(--text)"><input type="checkbox" id="userGlobal"> Global access (all pools)</label>
    </div>
    <div class="actions">
      <button onclick="closeModal('userModal')">Cancel</button>
      <button class="primary" onclick="submitUser()">Add User</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
let availableDisks = [];

async function api(path, opts) {
  const r = await fetch(API + path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || r.statusText);
  return data;
}

function toast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3000);
}

function badge(state) {
  return `<span class="badge ${state}">${state}</span>`;
}

function fmtBytes(b) {
  if (b >= 1e9) return (b / 1e9).toFixed(1) + ' GB';
  if (b >= 1e6) return (b / 1e6).toFixed(1) + ' MB';
  return (b / 1e3).toFixed(0) + ' KB';
}

async function refresh() {
  try {
    const pools = await api('/pools');
    const el = document.getElementById('pools');
    if (!pools || pools.length === 0) {
      el.innerHTML = '<div class="empty">No pools yet. Create one to get started.</div>';
      return;
    }
    let html = '';
    for (const p of pools) {
      const status = await api('/pools/' + p.ID);
      poolStatusCache[p.ID] = status;
      html += renderPool(p, status);
    }
    el.innerHTML = html;
  } catch (e) { toast(e.message, true); }
}

function fmtParity(mode) {
  return mode === 1 ? 'SHR-2' : 'SHR-1';
}

function renderPool(summary, status) {
  const pool = status.Pool;
  const arrays = status.ArrayStatuses || [];
  const disks = status.DiskStatuses || [];

  let arrayRows = arrays.map(a =>
    `<tr><td>${a.Device}</td><td>RAID${a.RAIDLevel}</td><td>Tier ${a.TierIndex}</td>
     <td>${badge(a.State)}</td><td>${fmtBytes(a.CapacityBytes)}</td>
     <td style="font-size:11px;color:var(--muted)">${(a.Members||[]).join(', ')}</td></tr>`
  ).join('');

  let diskRows = disks.map(d =>
    `<tr><td>${d.Device}</td><td>${fmtBytes(d.CapacityBytes)}</td><td>${badge(d.State)}</td>
     <td style="font-size:11px;color:var(--muted)">${(d.ContributingArrays||[]).join(', ')}</td></tr>`
  ).join('');

  const rebuilding = arrays.some(a => a.State === 'rebuilding');

  // Build slice visualization
  const tierColors = ['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#ef4444'];
  const poolDisks = pool.Disks || [];
  const maxCap = Math.max(...poolDisks.map(d => d.CapacityBytes || 0), 1);
  let sliceMapHTML = '<div style="margin:12px 0">';
  sliceMapHTML += '<h3 style="font-size:13px;margin-bottom:8px">Disk Layout</h3>';
  // Legend
  sliceMapHTML += '<div style="display:flex;gap:12px;margin-bottom:8px;font-size:11px">';
  const tierSet = new Set();
  poolDisks.forEach(d => (d.Slices||[]).forEach(s => tierSet.add(s.TierIndex)));
  [...tierSet].sort().forEach(ti => {
    const arr = arrays.find(a => a.TierIndex === ti);
    const label = arr ? `Tier ${ti} → ${arr.Device} (RAID${arr.RAIDLevel})` : `Tier ${ti}`;
    sliceMapHTML += `<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${tierColors[ti%tierColors.length]};margin-right:4px;vertical-align:middle"></span>${label}</span>`;
  });
  sliceMapHTML += '</div>';
  // Bars
  poolDisks.forEach(d => {
    const w = ((d.CapacityBytes||0) / maxCap * 100);
    sliceMapHTML += `<div style="display:flex;align-items:center;margin:3px 0;gap:8px">`;
    sliceMapHTML += `<div style="width:90px;font-size:11px;text-align:right;flex-shrink:0;color:${d.State==='failed'?'var(--red)':'var(--text)'}">${d.Device.replace('/dev/','')}<br><span style="color:var(--muted)">${fmtBytes(d.CapacityBytes)}</span></div>`;
    sliceMapHTML += `<div style="flex:1;display:flex;height:24px;border-radius:4px;overflow:hidden;background:var(--border);max-width:${w}%">`;
    const slices = (d.Slices||[]).sort((a,b) => a.TierIndex - b.TierIndex);
    const totalSlice = slices.reduce((s,sl) => s + (sl.SizeBytes||0), 0);
    const diskCap = d.CapacityBytes || totalSlice;
    slices.forEach(sl => {
      const pct = diskCap > 0 ? (sl.SizeBytes / diskCap * 100) : 0;
      const color = tierColors[sl.TierIndex % tierColors.length];
      const opacity = d.State === 'failed' ? '0.3' : '1';
      sliceMapHTML += `<div style="width:${pct}%;background:${color};opacity:${opacity};display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:600" title="Tier ${sl.TierIndex}: ${fmtBytes(sl.SizeBytes)}">T${sl.TierIndex}</div>`;
    });
    const freeBytes = diskCap - totalSlice;
    if (freeBytes > diskCap * 0.01) {
      const freePct = (freeBytes / diskCap * 100);
      sliceMapHTML += `<div style="width:${freePct}%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted)" title="Free: ${fmtBytes(freeBytes)}">free</div>`;
    }
    sliceMapHTML += '</div></div>';
  });
  sliceMapHTML += '</div>';

  return `
  <div class="card">
    <h2>${pool.Name} ${badge(pool.State)}
      <span style="flex:1"></span>
      <button onclick="showAddDisk('${pool.ID}')">+ Disk</button>
      <button onclick="showRemoveDisk('${pool.ID}')">− Disk</button>
      <button onclick="showFailDisk('${pool.ID}')">⚠ Fail</button>
      <button onclick="showReplaceDisk('${pool.ID}')">↺ Replace</button>
      ${rebuilding ? `<button onclick="watchRebuild('${pool.ID}')">📊 Rebuild</button>` : ''}
      <button class="danger" onclick="deletePool('${pool.ID}','${pool.Name}')">✕ Delete</button>
    </h2>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px">
      ID: ${pool.ID} &nbsp;|&nbsp; ${fmtParity(pool.ParityMode)} &nbsp;|&nbsp;
      Mount: ${pool.MountPoint}
    </div>
    ${(() => {
      const rawTotal = poolDisks.reduce((s,d) => s + (d.CapacityBytes||0), 0);
      const usable = status.TotalCapacityBytes || 0;
      const used = status.UsedCapacityBytes || 0;
      const free = status.FreeCapacityBytes || (usable - used);
      const unallocated = poolDisks.reduce((s,d) => {
        const sliced = (d.Slices||[]).reduce((ss,sl) => ss + (sl.SizeBytes||0), 0);
        return s + ((d.CapacityBytes||0) - sliced);
      }, 0);
      const slicedTotal = poolDisks.reduce((s,d) => s + (d.Slices||[]).reduce((ss,sl) => ss + (sl.SizeBytes||0), 0), 0);
      const sumArrayCap = arrays.reduce((s,a) => s + (a.CapacityBytes||0), 0);
      const raidParity = slicedTotal - sumArrayCap; // RAID redundancy + mdadm metadata
      const overhead = sumArrayCap - usable; // LVM + ext4 overhead
      const usablePct = rawTotal > 0 ? (usable / rawTotal * 100).toFixed(0) : 0;
      const parityPct = rawTotal > 0 ? (raidParity / rawTotal * 100).toFixed(0) : 0;
      // Stacked bar
      const usedOfUsable = usable > 0 ? (used / usable * 100) : 0;
      const freeOfUsable = usable > 0 ? (free / usable * 100) : 0;
      const parityOfRaw = rawTotal > 0 ? (raidParity / rawTotal * 100) : 0;
      const overheadOfRaw = rawTotal > 0 ? (Math.max(0,overhead) / rawTotal * 100) : 0;
      const unallocOfRaw = rawTotal > 0 ? (unallocated / rawTotal * 100) : 0;
      const usableOfRaw = 100 - parityOfRaw - overheadOfRaw - unallocOfRaw;
      return `
      <div style="margin-bottom:14px">
        <div style="display:flex;gap:20px;font-size:13px;margin-bottom:6px">
          <div><span style="color:var(--muted)">Raw Disk Total:</span> ${fmtBytes(rawTotal)}</div>
          <div><span style="color:var(--muted)">Usable:</span> ${fmtBytes(usable)} <span style="color:var(--green)">(${usablePct}%)</span></div>
          <div><span style="color:var(--muted)">Used:</span> ${fmtBytes(used)}${usable > 0 ? ` (${(used/usable*100).toFixed(1)}%)` : ''}</div>
          <div><span style="color:var(--muted)">Protection:</span> ${fmtBytes(raidParity)} <span style="color:var(--accent)">(${parityPct}%)</span></div>
          ${overhead > 0 ? `<div><span style="color:var(--muted)">Overhead:</span> ${fmtBytes(overhead)}</div>` : ''}
          ${unallocated > 0 ? `<div><span style="color:var(--muted)">Expansion Potential:</span> <span style="color:var(--text)">${fmtBytes(unallocated)}</span></div>` : ''}
        </div>
        <div style="display:flex;height:20px;border-radius:4px;overflow:hidden;font-size:10px;font-weight:600">
          ${used > 0 ? `<div style="width:${usedOfUsable * usableOfRaw / 100}%;background:var(--green);display:flex;align-items:center;justify-content:center;color:#fff" title="Used: ${fmtBytes(used)}">Used</div>` : ''}
          <div style="width:${freeOfUsable * usableOfRaw / 100}%;background:rgba(34,197,94,0.2);display:flex;align-items:center;justify-content:center;color:var(--green)" title="Free: ${fmtBytes(free)}">Free ${fmtBytes(free)}</div>
          <div style="width:${parityOfRaw}%;background:rgba(59,130,246,0.25);display:flex;align-items:center;justify-content:center;color:var(--accent)" title="Parity/Redundancy: ${fmtBytes(raidParity)}">Parity ${fmtBytes(raidParity)}</div>
          ${overheadOfRaw > 0.5 ? `<div style="width:${overheadOfRaw}%;background:rgba(234,179,8,0.2);display:flex;align-items:center;justify-content:center;color:var(--yellow);font-size:9px" title="LVM/ext4/mdadm overhead: ${fmtBytes(overhead)}">Overhead</div>` : ''}
          ${unallocOfRaw > 0.5 ? `<div style="width:${unallocOfRaw}%;background:var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted)" title="Unallocated: ${fmtBytes(unallocated)} — add more disks to create new tiers">Expansion ${fmtBytes(unallocated)}</div>` : ''}
        </div>
      </div>`;
    })()}
    <div id="rebuild-${pool.ID}"></div>
    <h3 style="font-size:13px;margin:12px 0 6px">Arrays</h3>
    <table><tr><th>Device</th><th>Level</th><th>Tier</th><th>State</th><th>Capacity</th><th>Members</th></tr>${arrayRows}</table>
    <h3 style="font-size:13px;margin:12px 0 6px">Disks</h3>
    <table><tr><th>Device</th><th>Size</th><th>State</th><th>Arrays</th></tr>${diskRows}</table>
    ${sliceMapHTML}
  </div>`;
}

// --- Create Pool ---
async function showCreateModal() {
  try { availableDisks = await api('/disks'); } catch(e) { availableDisks = []; }
  const el = document.getElementById('diskSelect');
  el.innerHTML = availableDisks.map(d => {
    const cls = d.inUse ? 'disk-chip in-use' : 'disk-chip';
    const label = d.inUse ? `${d.device} (${d.sizeGB.toFixed(1)}G) [${d.pool}]` : `${d.device} (${d.sizeGB.toFixed(1)}G)`;
    return `<div class="${cls}" data-dev="${d.device}" ${d.inUse ? '' : `onclick="this.classList.toggle('selected'); updateCreatePreview()"`}>${label}</div>`;
  }).join('') || '<span style="color:var(--muted)">No available disks found</span>';
  document.getElementById('createPreview').innerHTML = '';
  document.getElementById('createModal').classList.add('active');
}

function autoSelectDisks() {

  let html = `<label>${label}</label><div class="disk-select" id="${id}">`;
  for (const d of disks) {
    const extra = d.sizeGB ? ` (${d.sizeGB.toFixed(1)}G)` : '';

    html += `<div class="disk-chip" data-dev="${d.device}" onclick="chipSelect('${id}', this)">${d.device}${extra}${stateTag}</div>`;
  }
  html += '</div>';
  return html;

// --- SSE Rebuild Watch ---
function watchRebuild(poolID) {
  const el = document.getElementById('rebuild-' + poolID);
  if (!el || activeSSE[poolID]) return;
  el.innerHTML = '<div style="font-size:12px;color:var(--muted)">Monitoring rebuild...</div>';
  const es = new EventSource(API + '/pools/' + poolID + '/rebuild');
  activeSSE[poolID] = es;
  es.onmessage = (e) => {
    const evt = JSON.parse(e.data);
    const arrays = evt.pool.ArrayStatuses || [];
    const progress = evt.progress || {};
    let html = '';
    for (const a of arrays) {
      if (a.State === 'rebuilding') {
        const pct = (progress[a.Device] || 0).toFixed(1);
        html += `<div style="margin:4px 0;font-size:12px">${a.Device} rebuilding — ${pct}%
          <div class="progress-bar"><div class="fill" style="width:${pct}%"></div></div></div>`;
      }
    }
    if (html) el.innerHTML = html; else el.innerHTML = '<div style="font-size:12px;color:var(--green)">✓ Rebuild complete</div>';
  };
  es.addEventListener('done', () => { es.close(); delete activeSSE[poolID]; refresh(); });
  es.addEventListener('error', () => { es.close(); delete activeSSE[poolID]; el.innerHTML = ''; });
}

async function refreshSafety() {
  try {
    const s = await api('/safety-status');
    const el = document.getElementById('safety');
    if (!s || !s.running) { el.innerHTML = ''; return; }
    const ago = (t) => {
      if (!t || t.startsWith('0001')) return 'never';
      const sec = Math.floor((Date.now() - new Date(t).getTime()) / 1000);
      if (sec < 60) return sec + 's ago';
      if (sec < 3600) return Math.floor(sec/60) + 'm ago';
      return Math.floor(sec/3600) + 'h ago';
    };
    const features = [
      { icon: '💚', name: 'SMART Monitoring', interval: s.smart.interval, last: s.smart.lastRun, detail: s.smart.detail },
      { icon: '🔍', name: 'Scrub Scheduler', interval: s.scrub.interval, last: s.scrub.lastRun, detail: s.scrub.detail || 'periodic array check' },
      { icon: '💾', name: 'Metadata Backup', interval: s.metadataBackup.interval, last: s.metadataBackup.lastRun, detail: s.metadataBackup.detail || 'to pool mount' },
      { icon: '🔧', name: 'Boot Config', interval: s.bootConfig.interval, last: s.bootConfig.lastRun, detail: s.bootConfig.detail || 'mdadm.conf + initramfs' },
      { icon: '🛡️', name: 'Graceful Shutdown', interval: s.gracefulShutdown.interval, last: null, detail: s.gracefulShutdown.detail },
    ];
    el.innerHTML = `<div class="card"><h2>🛡️ Safety Daemon</h2>
      <div style="display:flex;gap:8px;margin-bottom:12px;font-size:13px">
        <span style="color:var(--green)">● Running</span>
        <span style="color:var(--muted)">Uptime: ${s.uptime}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px">
        ${features.map(f => `<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px">
          <div style="font-weight:600;margin-bottom:4px">${f.icon} ${f.name}</div>
          <div style="font-size:12px;color:var(--muted)">Every ${f.interval}</div>
          ${f.last ? `<div style="font-size:12px;color:var(--green)">Last: ${ago(f.last)}</div>` : ''}
          ${f.detail ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">${f.detail}</div>` : ''}
        </div>`).join('')}
      </div>
    </div>`;
  } catch(e) {}
}

// Auto-refresh every 10s (5s when rebuilding)
let refreshInterval = setInterval(refresh, 10000);

// Track active SSE connections
let activeSSE = {};

async function autoWatchRebuilds() {
  try {
    const pools = await api('/pools');
    for (const p of pools) {
      const status = poolStatusCache[p.ID];
      if (!status) continue;
      const isRebuilding = (status.ArrayStatuses || []).some(a => a.State === 'rebuilding');
      if (isRebuilding && !activeSSE[p.ID]) {
        watchRebuild(p.ID);
        // Speed up refresh during rebuild
        clearInterval(refreshInterval);
        refreshInterval = setInterval(refresh, 5000);
      }
      if (!isRebuilding && activeSSE[p.ID]) {
        activeSSE[p.ID].close();
        delete activeSSE[p.ID];
        clearInterval(refreshInterval);
        refreshInterval = setInterval(refresh, 10000);
      }
    }
  } catch(e) {}
}
setInterval(autoWatchRebuilds, 3000);

function showShareModal(poolID, editName) {
  document.getElementById('sharePoolID').value = poolID;
  document.getElementById('shareEditName').value = editName || '';
  document.getElementById('shareModalTitle').textContent = editName ? 'Edit Share' : 'Create Share';
  if (!editName) {
    document.getElementById('shareNameInput').value = '';
    document.getElementById('shareSMB').checked = true;
    document.getElementById('shareNFS').checked = false;
    document.getElementById('shareNFSClients').value = '*';
    document.getElementById('shareReadOnly').checked = false;
    document.getElementById('shareGuest').checked = false;
    document.getElementById('shareBrowsable').checked = true;
  }
  document.getElementById('shareModal').classList.add('active');
}

async function editShare(poolID, name) {
  const shares = await api('/pools/' + poolID + '/shares');
  const s = shares.find(x => x.name === name);
  if (!s) return;
  document.getElementById('shareNameInput').value = s.name;
  document.getElementById('shareNameInput').disabled = true;
  document.getElementById('shareSMB').checked = (s.protocols||[]).includes('smb');
  document.getElementById('shareNFS').checked = (s.protocols||[]).includes('nfs');
  document.getElementById('shareNFSClients').value = s.nfs_clients || '*';
  document.getElementById('shareReadOnly').checked = s.read_only;
  document.getElementById('shareGuest').checked = s.smb_public;
  document.getElementById('shareBrowsable').checked = s.smb_browsable;
  showShareModal(poolID, name);
}

async function submitShare() {
  const poolID = document.getElementById('sharePoolID').value;
  const editName = document.getElementById('shareEditName').value;
  const protos = [];
  if (document.getElementById('shareSMB').checked) protos.push('smb');
  if (document.getElementById('shareNFS').checked) protos.push('nfs');
  const share = {
    name: document.getElementById('shareNameInput').value.trim(),
    protocols: protos,
    nfs_clients: document.getElementById('shareNFSClients').value.trim(),
    read_only: document.getElementById('shareReadOnly').checked,
    smb_public: document.getElementById('shareGuest').checked,
    smb_browsable: document.getElementById('shareBrowsable').checked,
  };
  if (!share.name) return toast('Enter a share name', true);
  if (protos.length === 0) return toast('Select at least one protocol', true);
  try {
    if (editName) {
      await api('/pools/' + poolID + '/shares/' + editName, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(share) });
      toast('Share updated');
    } else {
      await api('/pools/' + poolID + '/shares', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(share) });
      toast('Share created');
    }
    document.getElementById('shareNameInput').disabled = false;
    closeModal('shareModal');
    refreshShares();
  } catch(e) { toast(e.message, true); }
}

async function deleteShare(poolID, name) {
  try {
    const info = await api('/pools/' + poolID + '/shares/' + name, { method: 'DELETE' });
    if (info.confirm) {
      const size = fmtBytes(info.sizeBytes || 0);
      if (!confirm(`Delete share "${name}"? This will permanently remove ${size} of data.`)) return;
      await api('/pools/' + poolID + '/shares/' + name + '?force=true', { method: 'DELETE' });
    }
    toast('Share deleted');
    refreshShares();
  } catch(e) { toast(e.message, true); }
}

// --- Users Panel ---
async function refreshUsers() {
  try {
    const users = await api('/users');
    const el = document.getElementById('users');
    let html = `<div class="card"><h2>👤 Users <span style="flex:1"></span><button onclick="showUserModal()">+ User</button></h2>`;
    if (!users || users.length === 0) {
      html += '<div style="color:var(--muted);font-size:13px;padding:8px 0">No users yet</div>';
    } else {
      html += '<table><tr><th>Name</th><th>UID</th><th>Pool</th><th>Global</th><th></th></tr>';
      for (const u of users) {
        html += `<tr><td>${u.name}</td><td>${u.uid}</td><td>${u.pool_id}</td><td>${u.global_access ? '✓' : ''}</td>
          <td><button class="danger" onclick="deleteUser('${u.name}')" style="font-size:11px;padding:2px 8px">Delete</button></td></tr>`;
      }
      html += '</table>';
    }
    html += '</div>';
    el.innerHTML = html;
  } catch(e) {}
}

async function showUserModal() {
  const pools = await api('/pools');
  const sel = document.getElementById('userPoolSelect');
  sel.innerHTML = pools.map(p => `<option value="${p.ID}">${p.Name}</option>`).join('');
  document.getElementById('userNameInput').value = '';
  document.getElementById('userPassInput').value = '';
  document.getElementById('userGlobal').checked = false;
  document.getElementById('userModal').classList.add('active');
}

async function submitUser() {
  const name = document.getElementById('userNameInput').value.trim();
  const password = document.getElementById('userPassInput').value;
  const poolID = document.getElementById('userPoolSelect').value;
  const globalAccess = document.getElementById('userGlobal').checked;
  if (!name || !password) return toast('Name and password required', true);
  try {
    await api('/users', { method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, password, pool_id: poolID, global_access: globalAccess}) });
    toast('User created');
    closeModal('userModal');
    refreshUsers();
  } catch(e) { toast(e.message, true); }
}

async function deleteUser(name) {
  if (!confirm(`Delete user "${name}"?`)) return;
  try {
    await api('/users/' + name, { method: 'DELETE' });
    toast('User deleted');
    refreshUsers();
  } catch(e) { toast(e.message, true); }
}

// --- Monitoring SSE ---
let monitorSSE = null;

function startMonitoringSSE() {
  if (monitorSSE) return;
  monitorSSE = new EventSource(API + '/monitoring/live');
  monitorSSE.onmessage = (e) => {
    const snap = JSON.parse(e.data);
    updateGauges(snap);
  };
  monitorSSE.onerror = () => { stopMonitoringSSE(); };
  refreshClients();
  refreshProtocolStatus();
}

function stopMonitoringSSE() {
  if (monitorSSE) { monitorSSE.close(); monitorSSE = null; }
}

function updateGauges(snap) {
  let totalRead = 0, totalWrite = 0;
  (snap.disk_io || []).forEach(d => { totalRead += d.read_mbps; totalWrite += d.write_mbps; });
  document.getElementById('gaugeDiskRead').textContent = totalRead.toFixed(1) + ' MB/s';
  document.getElementById('gaugeDiskWrite').textContent = totalWrite.toFixed(1) + ' MB/s';

  let totalRx = 0, totalTx = 0, smbInfo = '', nfsInfo = '';
  (snap.net_io || []).forEach(n => {
    if (n.protocol === 'smb') { smbInfo = n.rx_mbps.toFixed(0) + ' conn'; return; }
    if (n.protocol === 'nfs') { nfsInfo = n.rx_mbps.toFixed(0) + ' conn'; return; }
    totalRx += n.rx_mbps; totalTx += n.tx_mbps;
  });
  document.getElementById('gaugeNetRx').textContent = totalRx.toFixed(1) + ' MB/s';
  document.getElementById('gaugeNetTx').textContent = totalTx.toFixed(1) + ' MB/s';
  document.getElementById('gaugeSMB').textContent = smbInfo || '0 conn';
  document.getElementById('gaugeNFS').textContent = nfsInfo || '0 conn';
}

async function refreshClients() {
  try {
    const clients = await api('/monitoring/clients');
    const tbody = document.getElementById('clientsTable');
    const noClients = document.getElementById('noClients');
    if (!clients || clients.length === 0) {
      tbody.innerHTML = '<tr><th>User</th><th>IP</th><th>Share</th><th>Protocol</th><th>Duration</th></tr>';
      noClients.style.display = '';
      return;
    }
    noClients.style.display = 'none';
    let rows = '<tr><th>User</th><th>IP</th><th>Share</th><th>Protocol</th><th>Duration</th></tr>';
    const now = Math.floor(Date.now() / 1000);
    for (const c of clients) {
      const dur = now - (c.connected_at || now);
      const durStr = dur < 60 ? dur + 's' : dur < 3600 ? Math.floor(dur/60) + 'm' : Math.floor(dur/3600) + 'h ' + Math.floor((dur%3600)/60) + 'm';
      rows += `<tr><td>${c.user || '-'}</td><td>${c.ip}</td><td>${c.share || '-'}</td><td>${c.protocol}</td><td>${durStr}</td></tr>`;
    }
    tbody.innerHTML = rows;
  } catch(e) {}
}

async function refreshProtocolStatus() {
  try {
    const s = await api('/monitoring/status');
    const el = document.getElementById('protocolStatus');
    el.innerHTML = `SMB ${s.smb ? '<span style="color:var(--green)">✓</span>' : '<span style="color:var(--red)">✗</span>'} &nbsp; NFS ${s.nfs ? '<span style="color:var(--green)">✓</span>' : '<span style="color:var(--red)">✗</span>'}`;
  } catch(e) {}
}

// Refresh shares/users on load and periodically
refreshShares();
refreshUsers();
setInterval(refreshShares, 15000);
setInterval(refreshUsers, 15000);
setInterval(() => { if (monitorSSE) { refreshClients(); refreshProtocolStatus(); } }, 5000);
</script>
